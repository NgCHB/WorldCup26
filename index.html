let selectedCountry = null;
let currentQ = 0;
let streak = 0;
let varUsed = false;
let subUsed = false;
let questions = [];

const STAGES = ["Group Stage","Group Stage","Group Stage","Round of 16","Quarter-final","Quarter-final","Semi-final","Semi-final","Final","Final"];
const COMMENTARY_CORRECT = ["⚽ GOOOAL!","🎉 What a strike!","🏟️ The crowd goes wild!","💥 Unstoppable!","🔥 On fire!"];
const COMMENTARY_WRONG = ["🧤 Saved by the keeper!","❌ Off the post!","😤 Eliminated!"];

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function init() {
    const grid = document.getElementById('country-grid');
    COUNTRIES.forEach(([flag,name],i) => {
        const btn = document.createElement('button');
        btn.className = 'country-btn w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-2xl rounded-lg bg-white/10 hover:bg-white/20 border border-white/5';
        btn.textContent = flag;
        btn.title = name;
        btn.setAttribute('aria-label', name);
        btn.addEventListener('click', () => selectCountry(i));
        grid.appendChild(btn);
    });
}

function selectCountry(i) {
    selectedCountry = i;
    document.querySelectorAll('.country-btn').forEach((b,idx) => {
        b.classList.toggle('ring-2', idx===i);
        b.classList.toggle('ring-yellow-400', idx===i);
        b.classList.toggle('bg-yellow-400/20', idx===i);
    });
    document.getElementById('selected-display').classList.remove('hidden');
    document.getElementById('selected-flag').textContent = COUNTRIES[i][0];
    document.getElementById('selected-name').textContent = COUNTRIES[i][1];
    document.getElementById('start-btn').classList.remove('hidden');
}

function startGame() {
    questions = shuffle([...QUESTIONS]).slice(0,20);
    currentQ = 0; streak = 0; varUsed = false; subUsed = false;
    showScreen('game-screen');
    renderProgress();
    showQuestion();
}

function showScreen(id) {
    ['start-screen','game-screen','win-screen','eliminated-screen'].forEach(s => document.getElementById(s).classList.toggle('hidden', s!==id));
}

function renderProgress() {
    const bar = document.getElementById('progress-bar');
    bar.innerHTML = '';
    for(let i=0;i<10;i++){
        const seg = document.createElement('div');
        seg.className = `progress-segment flex-1 h-3 rounded-full ${i<streak?'bg-emerald-400':'bg-white/20'}`;
        bar.appendChild(seg);
    }
    document.getElementById('stage-label').textContent = STAGES[Math.min(streak,9)];
}

function showQuestion() {
    if(streak >= 10){ winGame(); return; }
    const q = questions[currentQ % questions.length];
    document.getElementById('question-content').textContent = q.q;
    const opponentIdx = Math.floor(Math.random()*48);
    document.getElementById('opponent-flag').textContent = COUNTRIES[opponentIdx][0];
    document.getElementById('opponent-name').textContent = COUNTRIES[opponentIdx][1];
    document.getElementById('player-flag').textContent = COUNTRIES[selectedCountry][0];
    document.getElementById('commentary').textContent = '';
    document.getElementById('var-btn').disabled = varUsed;
    document.getElementById('var-btn').classList.toggle('opacity-40', varUsed);
    document.getElementById('sub-btn').disabled = subUsed;
    document.getElementById('sub-btn').classList.toggle('opacity-40', subUsed);

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.opts.forEach((opt,i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn px-4 py-3 rounded-xl font-medium text-left bg-white/10 border border-white/10 hover:bg-white/20';
        btn.textContent = opt;
        btn.dataset.idx = i;
        btn.addEventListener('click', () => answer(i, q.ans, btn));
        container.appendChild(btn);
    });
}

function answer(chosen, correct, btn) {
    const container = document.getElementById('options-container');
    container.querySelectorAll('button').forEach(b => b.disabled = true);

    if(chosen === correct) {
        btn.classList.add('bg-emerald-500/40','border-emerald-400','goal-anim');
        streak++;
        document.getElementById('commentary').textContent = COMMENTARY_CORRECT[Math.floor(Math.random()*COMMENTARY_CORRECT.length)];
        renderProgress();
        currentQ++;
        setTimeout(showQuestion, 1000);
    } else {
        btn.classList.add('bg-red-500/40','border-red-400','shake-anim');
        container.querySelectorAll('button')[correct].classList.add('bg-emerald-500/40','border-emerald-400');
        document.getElementById('commentary').textContent = COMMENTARY_WRONG[Math.floor(Math.random()*COMMENTARY_WRONG.length)];
        setTimeout(eliminate, 1500);
    }
}

function eliminate() {
    document.getElementById('elim-detail').textContent = `You reached the ${STAGES[Math.min(streak,9)]} (${streak}/10 correct)`;
    showScreen('eliminated-screen');
}

function winGame() {
    showScreen('win-screen');
    document.getElementById('win-country').textContent = `${COUNTRIES[selectedCountry][0]} ${COUNTRIES[selectedCountry][1]}`;
    launchConfetti();
}

function launchConfetti() {
    const colors = ['#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa'];
    for(let i=0;i<40;i++){
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random()*100+'%';
        el.style.top = '-20px';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDelay = Math.random()*1.5+'s';
        el.style.borderRadius = Math.random()>0.5?'50%':'0';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), 4000);
    }
}

// Lifelines
document.getElementById('var-btn').addEventListener('click', () => {
    if(varUsed) return;
    varUsed = true;
    document.getElementById('var-btn').disabled = true;
    document.getElementById('var-btn').classList.add('opacity-40');
    const q = questions[currentQ % questions.length];
    const wrongIdxs = [0,1,2,3].filter(i=>i!==q.ans);
    shuffle(wrongIdxs);
    const toHide = wrongIdxs.slice(0,2);
    document.getElementById('options-container').querySelectorAll('button').forEach(b => {
        if(toHide.includes(parseInt(b.dataset.idx))) { b.classList.add('opacity-20','pointer-events-none'); b.disabled=true; }
    });
});

document.getElementById('sub-btn').addEventListener('click', () => {
    if(subUsed) return;
    subUsed = true;
    document.getElementById('sub-btn').disabled = true;
    document.getElementById('sub-btn').classList.add('opacity-40');
    currentQ++;
    showQuestion();
});

document.getElementById('start-btn').addEventListener('click', startGame);
