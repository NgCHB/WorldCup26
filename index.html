<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Chemistry Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0a0f24;
    --panel: #101a3a;
    --gold: #f2b33d;
    --ice: #f4f6fa;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--navy);
    color: var(--ice);
    font-family:'Barlow Semi Condensed', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 6vh 5vw 8vh;
    text-align:center;
  }

  h1{
    font-family:'Anton', sans-serif;
    text-transform:uppercase;
    line-height: .95;
    font-size: clamp(28px, 6vw, 56px);
    letter-spacing: .5px;
    max-width: 900px;
  }
  h1 .accent{ color: var(--gold); }

  .stage{
    width:100%;
    max-width:700px;
    margin: 40px auto 0;
    border-radius: 20px;
    overflow:hidden;
    border: 1px solid rgba(242,179,61,.25);
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.7);
  }
  .stage img{
    display:block;
    width:100%;
    height:auto;
  }

  .picker{
    width:100%;
    max-width:400px;
    margin-top: 44px;
  }
  label{
    display:block;
    font-size: 13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  select{
    width:100%;
    background: var(--panel);
    color: var(--ice);
    border: 1px solid rgba(242,179,61,.35);
    border-radius: 12px;
    padding: 16px 18px;
    font-family:'Barlow Semi Condensed', sans-serif;
    font-weight:600;
    font-size: 17px;
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
    background-image: linear-gradient(45deg, transparent 50%, var(--gold) 50%), linear-gradient(135deg, var(--gold) 50%, transparent 50%);
    background-position: calc(100% - 24px) 50%, calc(100% - 17px) 50%;
    background-size: 7px 7px, 7px 7px;
    background-repeat: no-repeat;
  }
  select:focus{ outline: 2px solid var(--gold); outline-offset: 2px; }

  @media (max-width: 480px){
    body{ padding: 5vh 6vw 6vh; }
  }
</style>
</head>
<body>

  <h1>FIFA World Cup 2026<br><span class="accent">Chemistry Challenge</span></h1>
<div class="picker">
    <select id="topicSelect" aria-label="Select a topic">
      <option value="">Select topic</option>
      <option value="/WorldCup26/solubility.html">Salts | Solubilty</option>
      <option value="/WorldCup26/qa.html">Qualitative Analysis</option>
    </select>
  </div>

  <div class="stage">
    <img src="/WorldCup26/Players.png">
  
<script>
  document.getElementById('topicSelect').addEventListener('change', function(){
    if(this.value){ window.location.href = this.value; }
  });
</script>

</body>
</html>
